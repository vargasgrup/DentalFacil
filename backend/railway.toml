[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.backend"
watchPatterns = ["/backend/**", "/Dockerfile.backend", "/backend/boot.py"]

[deploy]
startCommand = "python boot.py"
# Healthcheck disabled until DATABASE_URL is a real postgresql:// reference.
# Re-enable with: healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
