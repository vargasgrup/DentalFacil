[build]
builder = "DOCKERFILE"
# Path is from repo root (config-as-code does NOT follow Root Directory)
dockerfilePath = "Dockerfile.backend"
watchPatterns = ["/backend/**", "/Dockerfile.backend"]

[deploy]
startCommand = "sh -c 'alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
