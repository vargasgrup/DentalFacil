[build]
builder = "DOCKERFILE"
# Path is from repo root (config-as-code does NOT follow Root Directory)
dockerfilePath = "Dockerfile.frontend"
watchPatterns = ["/frontend/**", "/Dockerfile.frontend"]

[deploy]
startCommand = "npm start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
